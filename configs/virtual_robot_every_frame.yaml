query_mode: ventura

footprint:
  # VENTURA uses normalized image-space scale, not physical robot calibration.
  # These match ROBOT_WIDTH_PCT and ROBOT_HEIGHT_PCT in the original pipeline.
  width_ratio: 0.25
  height_ratio: 0.20

sift:
  enabled: true
  # Refresh robot-footprint crumbs every frame for full per-frame mask runs.
  max_query_points: 768
  window_size: 1
  min_points_per_frame: 8
  max_points_per_frame: 20
  sample_at_edges: true
  edge_offset_ratio: 0.10
  use_clahe: true
  clahe_clip_limit: 2.0
  clahe_tile_grid_size: 8
  n_octave_layers: 5
  contrast_threshold: 0.018
  edge_threshold: 20.0
  sigma: 1.5

  # Refresh full-frame anchors every frame too; anchors are excluded from masks.
  anchors:
    enabled: true
    max_query_points: 512
    window_size: 1
    min_points_per_frame: 8
    max_points_per_frame: 20
    n_octave_layers: 3
    contrast_threshold: 0.008
    edge_threshold: 15.0
    sigma: 1.2
