# CoTracker cache generation settings.
# The runner reads this file; edit values here instead of adding cache knobs to scripts.

chunk:
  size: 480
  window_size: 80
  step:

cache:
  grid_stride: 1
  region: bottom-third
  query_mode: confidence-refresh
  query_frame_stride: 1
  max_query_points: 0

  # A track becomes "bad" below this confidence and gets aborted/replaced.
  bad_track_confidence_threshold: 0.9
  # 0 means record each ID until it actually aborts/fades. Positive values can
  # force periodic refreshes, but the default does not impose a success horizon.
  max_track_frames: 0
  # Delay child IDs after a parent aborts/fades. 0 preserves immediate rebirth.
  refresh_birth_delay_frames: 0

tracker:
  device: cuda
  batch_size: 256
  hub_repo: facebookresearch/co-tracker
  hub_model: cotracker3_offline
  visibility_threshold: 0.9
  torch_home:
